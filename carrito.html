<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusShop | Carrito</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <header class="main-header">
        <nav class="container">
            <div class="logo">
                <a href="index.html">Campus<span>Shop</span></a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html">Tienda</a></li>
                <li><a href="carrito.html" class="active">Carrito</a></li>
                <li><a href="perfil.html">Perfil</a></li>
            </ul>
        </nav>
    </header>

    <main class="container cart-view">
        <section class="cart-items-list">
            <div class="cart-header">
                <h2>Tu Carrito</h2>
                <a href="vacio.html" class="btn-clear-cart">Vaciar carrito</a>
            </div>

            <article class="cart-item">
                <div class="item-img">
                    <img src="img/Libreta_Camper.jpg" alt="Libreta Campus">
                </div>
                <div class="item-info">
                    <h3>Libreta</h3>
                    <p class="item-price">$85.000</p>
                </div>
                <div class="item-controls">
                <div class="quantity-controls">
                    <button class="btn-qty">-</button>
                    <span class="qty-number">1</span>
                    <button class="btn-qty">+</button>
                </div>
                <button class="btn-remove-trash" title="Eliminar producto">
                    <span class="trash-icon">🗑️</span>
                </button>
                </div>
            </article>

            <article class="cart-item">
                <div class="item-img">
                    <img src="img/Mochila.jpg" alt="Casco Camper">
                </div>
                <div class="item-info">
                    <h3>Mochila</h3>
                    <p class="item-price">$85.000</p>
                </div>
                <div class="item-controls">
                <div class="quantity-controls">
                    <button class="btn-qty">-</button>
                    <span class="qty-number">1</span>
                    <button class="btn-qty">+</button>
                </div>
                <button class="btn-remove-trash" title="Eliminar producto">
                    <span class="trash-icon">🗑️</span>
                </button>
                </div>
            </article>

            <article class="cart-item">
                <div class="item-img">
                    <img src="img/Buzo.jpg" alt="Camisa Camper">
                </div>
                <div class="item-info">
                    <h3>Buzo</h3>
                    <p class="item-price">$85.000</p>
                </div>
                <div class="item-controls">
                <div class="quantity-controls">
                    <button class="btn-qty">-</button>
                    <span class="qty-number">1</span>
                    <button class="btn-qty">+</button>
                </div>
                <button class="btn-remove-trash" title="Eliminar producto">
                    <span class="trash-icon">🗑️</span>
                </button>
                </div>
            </article>
            </section>

        <aside class="cart-summary">
            <h3>Resumen del pedido</h3>
            <div class="summary-details">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>$85.000</span>
                </div>
                <div class="summary-row">
                    <span>Envío</span>
                    <span class="free">Gratis</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>$85.000</span>
                </div>
            </div>
            <a href="checkout.html" class="btn-primary">Finalizar Compra</a>
            <a href="catalogo.html" class="btn-continue">Continuar comprando</a>
        </aside>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 CampusShop - E-Commerce Universitario</p>
        </div>
    </footer>

</body>
</html>
